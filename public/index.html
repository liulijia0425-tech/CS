<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ClaimSnap">
<meta name="theme-color" content="#FFF8E1">
<title>ClaimSnap · 华商报销</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFBEF;--s1:#FFFFFF;--s2:#FFF8DC;--s3:#FFF3C0;--border:#FFE082;
  --text:#5D4037;--muted:#A1887F;--accent:#FFD600;--accent2:#FFAB00;
  --accent-glow:rgba(255,214,0,0.25);--blue:#29B6F6;--danger:#EF5350;
  --mono:'JetBrains Mono',monospace;--font:'Sora',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative}
.hdr{padding:calc(env(safe-area-inset-top,0px)+14px) 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg)}
.brand{display:flex;align-items:center;gap:9px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 2px 8px rgba(255,214,0,0.4)}
.brand-text{font-size:17px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.brand-text span{color:var(--accent2)}
.brand-sub{font-size:12px;color:var(--muted);font-family:var(--mono)}
.mnav{display:flex;align-items:center;gap:6px}
.mnav button{background:var(--s2);border:2px solid var(--border);color:var(--accent2);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.12s}
.mnav button:active{background:var(--border);transform:scale(0.92)}
.mnav span{font-size:13px;font-weight:700;color:var(--text);min-width:72px;text-align:center;background:var(--s2);border:2px solid var(--border);border-radius:10px;padding:4px 8px;cursor:pointer;transition:all 0.12s}
.mnav span:active{background:var(--border)}
.sum{margin:4px 16px 14px;background:linear-gradient(135deg,#FFD600,#FFAB00);border-radius:20px;padding:16px 18px;display:flex;align-items:center;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(255,171,0,0.35)}
.sum::before{content:'🦆';position:absolute;right:-8px;bottom:-10px;font-size:64px;opacity:0.15;transform:rotate(-10deg)}
.sum-main{flex:1;min-width:0}
.sum-label{font-size:10px;color:rgba(93,64,55,0.7);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.sum-amt{font-family:var(--mono);font-size:28px;font-weight:700;color:#5D4037;margin-top:3px;letter-spacing:-1px}
.sum-n{font-size:11px;color:rgba(93,64,55,0.6);margin-top:2px}
.list{flex:1;overflow-y:auto;padding:0 16px 110px;-webkit-overflow-scrolling:touch}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.day-hdr{font-size:11px;color:var(--muted);font-weight:600;padding:12px 0 6px;display:flex;justify-content:space-between}
.tx{background:var(--s1);border:2px solid var(--border);border-radius:18px;padding:13px;margin-bottom:8px;display:flex;gap:11px;align-items:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;animation:up 0.2s ease;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.tx:active{transform:scale(0.97);background:var(--s2)}
.tx::after{content:'';position:absolute;left:0;top:10px;bottom:10px;width:4px;background:var(--accent);border-radius:0 3px 3px 0}
.tx-thumb{width:44px;height:44px;border-radius:12px;object-fit:cover;flex-shrink:0;border:2px solid var(--border)}
.tx-ph{width:44px;height:44px;border-radius:12px;background:var(--s2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:4px;margin-top:3px}
.tag{background:var(--s3);border-radius:6px;padding:2px 8px;font-size:10px;color:var(--accent2);font-weight:600;border:1px solid var(--border)}
.tx-note{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-r{text-align:right;flex-shrink:0}
.tx-amt{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent2)}
.tx-time{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:14px;color:var(--muted)}
.empty-icon{font-size:64px;animation:wobble 2s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.empty p{font-size:13px;text-align:center;line-height:1.8;color:var(--muted)}
.fab-wrap{position:absolute;bottom:0;left:0;right:0;padding:10px 16px calc(14px + env(safe-area-inset-bottom,0px));background:linear-gradient(transparent,var(--bg) 50%)}
.fab-row{display:grid;grid-template-columns:3fr 1fr;gap:10px}
.fab{border:none;border-radius:18px;font-family:var(--font);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.fab:active{transform:scale(0.97)}
.fab-primary{background:linear-gradient(135deg,#FFD600,#FFAB00);color:#5D4037;box-shadow:0 6px 20px rgba(255,171,0,0.4);font-size:13px;padding:15px}
.fab-secondary{background:var(--s1);color:var(--text);border:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.06);font-size:18px;padding:10px 8px;flex-direction:column;gap:3px;line-height:1.2}
.mpicker-ov{position:fixed;inset:0;background:rgba(93,64,55,0.3);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.mpicker-ov.open{opacity:1;pointer-events:all}
.mpicker{background:var(--s1);border-radius:24px;padding:24px 20px;width:300px;border:3px solid var(--border);box-shadow:0 16px 48px rgba(0,0,0,0.12)}
.mpicker-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;text-align:center}
.mpicker-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px}
.mpicker-year{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.mpicker-year button{background:var(--s2);border:2px solid var(--border);color:var(--accent2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700}
.mpicker-year span{font-size:15px;font-weight:700;color:var(--text);min-width:48px;text-align:center}
.mpicker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.mpicker-m{background:var(--s2);border:2px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:all 0.12s}
.mpicker-m:active{transform:scale(0.93)}
.mpicker-m.active{background:var(--accent);border-color:var(--accent2);color:#5D4037}
.mpicker-m.has-data{border-color:var(--accent2)}
.mpicker-cancel{width:100%;padding:12px;background:var(--s2);border:2px solid var(--border);border-radius:12px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
.ov{position:fixed;inset:0;background:rgba(255,248,225,0.85);backdrop-filter:blur(8px);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.ov.open{opacity:1;pointer-events:all}
.sov{position:fixed;inset:0;background:rgba(93,64,55,0.3);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.sov.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border-radius:28px 28px 0 0;padding:20px 18px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.34,1.2,0.64,1);overflow-y:auto;max-height:92dvh;border-top:3px solid var(--border)}
.sov.open .sheet{transform:translateY(0)}
.handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 20px}
.scan-box{width:260px;height:320px;border:3px solid var(--accent);border-radius:20px;overflow:hidden;background:var(--s1);position:relative;box-shadow:0 8px 24px rgba(255,171,0,0.3)}
.scan-box img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1}
.scan-line{position:absolute;width:90%;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanLine 2s ease-in-out infinite;left:5%;z-index:2;border-radius:2px}
@keyframes scanLine{0%,100%{top:8%}50%{top:90%}}
.scan-hint{font-size:13px;color:var(--text);text-align:center;line-height:1.6;max-width:260px;background:var(--s1);border-radius:14px;padding:12px 16px;border:2px solid var(--border)}
.scan-hint b{display:block;font-size:14px;margin-bottom:2px;color:var(--accent2)}
.row2{display:flex;gap:10px;width:260px}
.sb{flex:1;padding:13px;border-radius:14px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.12s}
.sb.p{background:linear-gradient(135deg,#FFD600,#FFAB00);color:#5D4037}
.sb.s{background:var(--s1);color:var(--muted);border:2px solid var(--border)}
.sb:active{transform:scale(0.95)}
.spinner{width:60px;height:60px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--accent2);animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-msg{font-size:13px;color:var(--text);text-align:center;line-height:1.7;max-width:220px;background:var(--s1);border-radius:16px;padding:14px 18px;border:2px solid var(--border)}
.ai-msg b{color:var(--accent2);display:block;font-size:15px;margin-bottom:4px}
.r-thumb-wrap{display:flex;justify-content:center;margin-bottom:16px;position:relative}
.r-thumb{width:110px;height:72px;object-fit:cover;border-radius:14px;border:3px solid var(--border)}
.r-badge{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FFD600,#FFAB00);color:#5D4037;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 8px rgba(255,171,0,0.3)}
.r-cat{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px}
.r-amount{text-align:center;font-family:var(--mono);font-size:40px;font-weight:800;color:var(--accent2);letter-spacing:-2px;margin-bottom:3px}
.r-merchant{text-align:center;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.r-reason{text-align:center;font-size:11px;color:var(--muted);margin-bottom:18px;padding:0 8px;line-height:1.5}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.rf{display:flex;flex-direction:column;gap:5px}
.rf label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;font-weight:700}
.rf input,.rf select,.ri{background:var(--s2);border:2px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.13s;width:100%}
.rf input:focus,.rf select:focus,.ri:focus{border-color:var(--accent2)}
.rf select option{background:var(--s1)}
.ri{margin-bottom:12px}
.r-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rb{padding:14px;border-radius:14px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all 0.12s}
.rb.ok{background:linear-gradient(135deg,#FFD600,#FFAB00);color:#5D4037}
.rb.no{background:var(--s2);color:var(--muted);border:2px solid var(--border)}
.rb:active{transform:scale(0.96)}
.det-img{width:100%;height:150px;border-radius:16px;overflow:hidden;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;border:2px solid var(--border)}
.det-img img{width:100%;height:100%;object-fit:cover}
.det-rows{background:var(--s2);border-radius:16px;padding:4px 0;margin-bottom:14px;border:2px solid var(--border)}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:1px solid var(--border)}
.det-row:last-child{border:none}
.det-k{font-size:11px;color:var(--muted);flex-shrink:0;padding-right:10px;font-weight:600}
.det-v{font-size:12px;font-weight:600;text-align:right;word-break:break-word;max-width:200px;color:var(--text)}
.det-acts{display:grid;gap:8px}
.db{padding:13px;border-radius:14px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all 0.12s;text-align:center}
.db.del{background:rgba(239,83,80,0.1);color:var(--danger);border:2px solid rgba(239,83,80,0.3)}
.db.cls{background:var(--s2);color:var(--text);border:2px solid var(--border)}
.db:active{transform:scale(0.95)}
.exp-title{font-size:18px;font-weight:800;margin-bottom:2px;color:var(--text)}
.exp-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border:none}
.exp-il{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.exp-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px;color:var(--text)}
.exp-sub2{font-size:10px;color:var(--muted);font-family:var(--mono)}
.exp-a{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent2);flex-shrink:0;padding-left:6px}
.exp-total{display:flex;justify-content:space-between;align-items:center;padding:14px 0 2px;border-top:3px solid var(--border);margin-top:4px}
.exp-tl{font-size:14px;font-weight:700;color:var(--text)}
.exp-ta{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--accent2)}
.exp-btns{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.eb{padding:15px;border-radius:14px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all 0.12s;text-align:center}
.eb.excel{background:linear-gradient(135deg,#FFD600,#FFAB00);color:#5D4037;box-shadow:0 4px 12px rgba(255,171,0,0.3)}
.eb.copy{background:var(--s2);color:var(--text);border:2px solid var(--border)}
.eb:active{transform:scale(0.96)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s1);border:2px solid var(--border);border-radius:14px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;transition:all 0.24s;z-index:999;white-space:nowrap;pointer-events:none;max-width:calc(100vw - 32px);text-align:center;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="brand">
      <div class="logo">🦆</div>
      <div>
        <div class="brand-text">Claim<span>Snap</span></div>
        <div class="brand-sub">华商报销助手</div>
      </div>
    </div>
    <div class="mnav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="mLabel" onclick="openMonthPicker()" title="点击选择月份"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="sum">
    <div class="sum-main">
      <div class="sum-label">本月待报销</div>
      <div class="sum-amt" id="sumAmt">$0.00</div>
      <div class="sum-n" id="sumN">0 笔记录</div>
    </div>
  </div>
  <div class="list" id="list">
    <div class="empty" id="emptyEl">
      <div class="empty-icon">🦆</div>
      <p>上传收据截图<br>AI 自动识别金额与类别<br>月底一键导出华商报销单</p>
    </div>
    <div id="txList"></div>
  </div>
  <div class="fab-wrap">
    <div class="fab-row">
      <button class="fab fab-primary" onclick="triggerUpload()">拍照上传</button>
      <button class="fab fab-secondary" onclick="openExport()">📋<br><span style="font-size:11px;font-weight:700">报销导出</span></button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

<div class="ov" id="scanOv">
  <div class="scan-box">
    <div class="scan-line"></div>
    <img id="previewImg" src="" alt="" style="position:relative;z-index:1">
  </div>
  <div class="scan-hint"><b>图片已加载 🦆</b>点「AI 识别」自动提取信息</div>
  <div class="row2">
    <button class="sb s" onclick="closeScan()">取消</button>
    <button class="sb p" onclick="startRecognition()">✨ AI 识别</button>
  </div>
</div>

<div class="ov" id="aiOv">
  <div class="spinner"></div>
  <div class="ai-msg" id="aiMsg"><b>AI 分析中 🦆</b>正在识别收据内容…</div>
</div>

<div class="sov" id="resultOv" onclick="closeResultOv(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="r-thumb-wrap">
      <img class="r-thumb" id="rThumb" src="" alt="">
      <div class="r-badge">✨ AI 识别完成</div>
    </div>
    <div class="r-cat"><span id="rIcon" style="font-size:24px"></span><span id="rCatName" style="font-size:12px;color:var(--muted);font-weight:600"></span></div>
    <div class="r-amount" id="rAmt">$0.00</div>
    <div class="r-merchant" id="rMerchant"></div>
    <div class="r-reason" id="rReason"></div>
    <div class="r-grid">
      <div class="rf"><label>金额 SGD</label><input id="rAmtIn" type="number" step="0.01" min="0" inputmode="decimal"></div>
      <div class="rf"><label>发票张数</label><input id="rInvIn" type="number" min="1" value="1" inputmode="numeric"></div>
    </div>
    <div class="r-grid">
      <div class="rf"><label>费用类别</label><select id="rCatSel"></select></div>
      <div class="rf"><label>日期</label><input id="rDateIn" type="date"></div>
    </div>
    <div class="rf" style="margin-bottom:12px">
      <label>描述（填入报销单）</label>
      <input class="ri" id="rDescIn" type="text" placeholder="例：见客户打车 去程xxx" maxlength="80">
    </div>
    <div class="r-actions">
      <button class="rb no" onclick="closeResult()">重拍</button>
      <button class="rb ok" onclick="confirmEntry()">🦆 保存</button>
    </div>
  </div>
</div>

<div class="sov" id="detailOv" onclick="closeDetOv(event)">
  <div class="sheet" id="detailSheet"></div>
</div>
<div class="sov" id="expOv" onclick="closeExpOv(event)">
  <div class="sheet" id="expSheet"></div>
</div>
<div class="toast" id="toast"></div>

<div class="mpicker-ov" id="mpickerOv" onclick="closeMonthPicker(event)">
  <div class="mpicker">
    <div class="mpicker-title">🦆 选择月份</div>
    <div class="mpicker-sub">点击月份直接跳转</div>
    <div class="mpicker-year">
      <button onclick="pickerYearChange(-1)">‹</button>
      <span id="pickerYear"></span>
      <button onclick="pickerYearChange(1)">›</button>
    </div>
    <div class="mpicker-grid" id="pickerGrid"></div>
    <button class="mpicker-cancel" onclick="closeMonthPicker()">取消</button>
  </div>
</div>

<script>
const CATS=[
  {emoji:'💰',en:'Advertising',zh:'广告费'},
  {emoji:'🧹',en:'Cleaning',zh:'清洁费'},
  {emoji:'🍽️',en:'Entertainment',zh:'餐饮/招待'},
  {emoji:'📦',en:'Freight & Courier',zh:'快递/运费'},
  {emoji:'🏨',en:'General Expenses',zh:'通用费用'},
  {emoji:'🛡️',en:'Insurance',zh:'保险'},
  {emoji:'💳',en:'Interest Expense',zh:'利息支出'},
  {emoji:'⚖️',en:'Legal expenses',zh:'法律费用'},
  {emoji:'💡',en:'Light, Power, Heating',zh:'水电费'},
  {emoji:'🚗',en:'Motor Vehicle Expenses',zh:'车辆费用'},
  {emoji:'📋',en:'Office Expenses',zh:'办公费用'},
  {emoji:'🎓',en:'Conference & Seminar Expenses',zh:'会议/培训'},
  {emoji:'🖨️',en:'Printing & Stationery',zh:'印刷/文具'},
  {emoji:'🔧',en:'Repairs and Maintenance',zh:'维修保养'},
  {emoji:'🛒',en:'Subscriptions',zh:'订阅'},
  {emoji:'📱',en:'Telephone & Internet',zh:'电话/网络'},
  {emoji:'🚕',en:'Travel - National',zh:'国内交通'},
  {emoji:'✈️',en:'Travel - International',zh:'国际出行'},
];
document.getElementById('rCatSel').innerHTML=CATS.map(c=>`<option value="${c.en}">${c.emoji} ${c.zh}</option>`).join('');
let entries=JSON.parse(localStorage.getItem('cs_v4')||'[]');
let curMonth=new Date();
let pendingB64=null,pendingResult=null;
function save(){localStorage.setItem('cs_v4',JSON.stringify(entries));}
function fmt(n){return '$'+Math.abs(+n).toFixed(2);}
function getMS(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function getMe(){const ms=getMS(curMonth);return entries.filter(e=>e.date.startsWith(ms));}
function getCat(en){return CATS.find(c=>c.en===en)||CATS[4];}
function render(){
  document.getElementById('mLabel').textContent=curMonth.toLocaleDateString('zh-CN',{month:'short',year:'numeric'}).replace(' ','');
  const me=getMe();
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  document.getElementById('sumAmt').textContent=fmt(total);
  document.getElementById('sumN').textContent=me.length+' 笔记录';
  const sorted=[...me].sort((a,b)=>(b.date+'T'+b.time).localeCompare(a.date+'T'+a.time));
  const byDay={};
  sorted.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);});
  const days=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  const emptyEl=document.getElementById('emptyEl');
  const listEl=document.getElementById('txList');
  if(!sorted.length){emptyEl.style.display='flex';listEl.innerHTML='';return;}
  emptyEl.style.display='none';
  listEl.innerHTML=days.map(day=>{
    const items=byDay[day];
    const dt=items.reduce((s,e)=>s+(+e.amount),0);
    const d=new Date(day+'T12:00:00');
    const isToday=day===new Date().toISOString().slice(0,10);
    const ds=isToday?'今天 🦆':d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    return `<div><div class="day-hdr"><span>${ds}</span><span>${fmt(dt)}</span></div>${items.map(txHTML).join('')}</div>`;
  }).join('');
}
function txHTML(e){
  const cat=getCat(e.cat);
  const th=e.thumb?`<img class="tx-thumb" src="${e.thumb}" alt="">`:`<div class="tx-ph">${cat.emoji}</div>`;
  return `<div class="tx" onclick="openDetail('${e.id}')">
    ${th}
    <div class="tx-info">
      <div class="tx-name">${e.desc||e.merchant||cat.zh}</div>
      <div class="tx-meta"><span class="tag">${cat.emoji} ${cat.zh}</span></div>
      ${e.merchant&&e.desc?`<div class="tx-note">${e.merchant}</div>`:''}
    </div>
    <div class="tx-r">
      <div class="tx-amt">${fmt(e.amount)}</div>
      <div class="tx-time">${e.time}</div>
    </div>
  </div>`;
}
function changeMonth(d){curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+d,1);render();}
function triggerUpload(){document.getElementById('fileInput').click();}
function handleFile(ev){
  const file=ev.target.files[0];if(!file)return;ev.target.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.85);
      pendingB64=dataUrl.split(',')[1];
      document.getElementById('previewImg').src=dataUrl;
      document.getElementById('scanOv').classList.add('open');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function closeScan(){document.getElementById('scanOv').classList.remove('open');pendingB64=null;}
async function startRecognition(){
  if(!pendingB64){toast('⚠️ 请先选择图片');return;}
  document.getElementById('scanOv').classList.remove('open');
  document.getElementById('aiOv').classList.add('open');
  const msgs=['<b>AI 分析中 🦆</b>正在识别收据内容…','<b>AI 分析中 🦆</b>提取金额与商家…','<b>AI 分析中 🦆</b>匹配华商费用类别…'];
  let si=0;
  const tick=setInterval(()=>{document.getElementById('aiMsg').innerHTML=msgs[si++%msgs.length];},1400);
  try{
    const resp=await fetch('/api/recognize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:pendingB64})});
    const r=await resp.json();
    if(r.error)throw new Error(r.error);
    clearInterval(tick);
    document.getElementById('aiOv').classList.remove('open');
    showResult(r);
  }catch(err){
    clearInterval(tick);
    document.getElementById('aiOv').classList.remove('open');
    toast('❌ 识别失败，请重试');console.error(err);
  }
}
function showResult(r){
  pendingResult=r;
  const cat=getCat(r.category);
  document.getElementById('rThumb').src='data:image/jpeg;base64,'+pendingB64;
  document.getElementById('rIcon').textContent=cat.emoji;
  document.getElementById('rCatName').textContent=cat.zh;
  document.getElementById('rAmt').textContent=r.amount>0?fmt(r.amount):'$?';
  document.getElementById('rMerchant').textContent=r.merchant||'';
  document.getElementById('rReason').textContent=r.reason||'';
  document.getElementById('rAmtIn').value=r.amount||'';
  document.getElementById('rInvIn').value=r.invoices||1;
  document.getElementById('rDateIn').value=r.date||new Date().toISOString().slice(0,10);
  document.getElementById('rDescIn').value=r.desc||r.merchant||'';
  document.getElementById('rCatSel').value=r.category||'General Expenses';
  document.getElementById('resultOv').classList.add('open');
}
function closeResult(){document.getElementById('resultOv').classList.remove('open');pendingResult=null;}
function closeResultOv(e){if(e.target===document.getElementById('resultOv'))closeResult();}
function confirmEntry(){
  const amount=parseFloat(document.getElementById('rAmtIn').value);
  if(!amount||amount<=0){toast('⚠️ 请填写金额');return;}
  const now=new Date();
  const entry={
    id:Date.now().toString(),amount,
    cat:document.getElementById('rCatSel').value,
    merchant:pendingResult?.merchant||'',
    desc:document.getElementById('rDescIn').value.trim(),
    date:document.getElementById('rDateIn').value||now.toISOString().slice(0,10),
    time:now.toTimeString().slice(0,5),
    invoices:parseInt(document.getElementById('rInvIn').value)||1,
    thumb:'data:image/jpeg;base64,'+pendingB64,
  };
  entries.unshift(entry);save();closeResult();pendingB64=null;
  const ed=new Date(entry.date+'T12:00:00');
  curMonth=new Date(ed.getFullYear(),ed.getMonth(),1);
  render();
  toast(`🦆 已保存 ${fmt(amount)}`);
}
function openDetail(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const cat=getCat(e.cat);
  const imgEl=e.thumb?`<div class="det-img"><img src="${e.thumb}" alt=""></div>`:`<div class="det-img">${cat.emoji}</div>`;
  document.getElementById('detailSheet').innerHTML=`
    <div class="handle"></div>${imgEl}
    <div class="det-rows">
      <div class="det-row"><span class="det-k">金额</span><span class="det-v" style="color:var(--accent2);font-family:var(--mono)">${fmt(e.amount)}</span></div>
      <div class="det-row"><span class="det-k">类别</span><span class="det-v">${cat.emoji} ${cat.zh}</span></div>
      <div class="det-row"><span class="det-k">描述</span><span class="det-v" style="font-size:11px">${e.desc||'—'}</span></div>
      <div class="det-row"><span class="det-k">商家</span><span class="det-v">${e.merchant||'—'}</span></div>
      <div class="det-row"><span class="det-k">发票数</span><span class="det-v">${e.invoices||1} 张</span></div>
      <div class="det-row"><span class="det-k">日期</span><span class="det-v" style="font-family:var(--mono)">${e.date}</span></div>
    </div>
    <div class="det-acts" style="grid-template-columns:1fr 1fr 1fr">
      <button class="db del" onclick="delEntry('${e.id}')">🗑️ 删除</button>
      <button class="db cls" onclick="openEdit('${e.id}')">✏️ 编辑</button>
      <button class="db cls" onclick="closeDet()">关闭</button>
    </div>`;
  document.getElementById('detailOv').classList.add('open');
}
function closeDet(){document.getElementById('detailOv').classList.remove('open');}
function closeDetOv(e){if(e.target===document.getElementById('detailOv'))closeDet();}
function delEntry(id){entries=entries.filter(x=>x.id!==id);save();render();closeDet();toast('🗑️ 已删除');}
function openEdit(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  closeDet();
  const catOpts=CATS.map(c=>`<option value="${c.en}" ${c.en===e.cat?'selected':''}>${c.emoji} ${c.zh}</option>`).join('');
  document.getElementById('detailSheet').innerHTML=`
    <div class="handle"></div>
    <div style="font-size:16px;font-weight:800;margin-bottom:18px;color:var(--text)">✏️ 编辑记录</div>
    <div class="r-grid">
      <div class="rf"><label>金额 SGD</label><input id="eAmt" type="number" step="0.01" min="0" value="${e.amount}" inputmode="decimal"></div>
      <div class="rf"><label>发票张数</label><input id="eInv" type="number" min="1" value="${e.invoices||1}" inputmode="numeric"></div>
    </div>
    <div class="r-grid">
      <div class="rf"><label>费用类别</label><select id="eCat">${catOpts}</select></div>
      <div class="rf"><label>日期</label><input id="eDate" type="date" value="${e.date}"></div>
    </div>
    <div class="rf" style="margin-bottom:10px"><label>描述</label><input class="ri" id="eDesc" type="text" value="${e.desc||''}" maxlength="80"></div>
    <div class="rf" style="margin-bottom:18px"><label>商家</label><input class="ri" id="eMerchant" type="text" value="${e.merchant||''}" maxlength="40"></div>
    <div class="r-actions">
      <button class="rb no" onclick="closeDet()">取消</button>
      <button class="rb ok" onclick="saveEdit('${e.id}')">🦆 保存</button>
    </div>`;
  document.getElementById('detailOv').classList.add('open');
}
function saveEdit(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const amount=parseFloat(document.getElementById('eAmt').value);
  if(!amount||amount<=0){toast('⚠️ 请填写金额');return;}
  e.amount=amount;e.cat=document.getElementById('eCat').value;
  e.date=document.getElementById('eDate').value;
  e.desc=document.getElementById('eDesc').value.trim();
  e.merchant=document.getElementById('eMerchant').value.trim();
  e.invoices=parseInt(document.getElementById('eInv').value)||1;
  save();render();closeDet();toast('🦆 已更新');
}
function openExport(){
  const me=getMe().sort((a,b)=>a.date.localeCompare(b.date));
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  const monthName=curMonth.toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
  let html=`<div class="handle"></div>
    <div class="exp-title">📋 ${monthName}报销单</div>
    <div class="exp-sub">${me.length} 笔 · 合计 ${fmt(total)}</div>`;
  if(!me.length){html+='<div style="text-align:center;padding:32px 0;font-size:32px">🦆<br><span style="font-size:13px;color:var(--muted)">本月暂无记录</span></div>';}
  else{
    html+=me.map(e=>{
      const cat=getCat(e.cat);
      return `<div class="exp-item">
        <div class="exp-il"><span style="font-size:16px;flex-shrink:0">${cat.emoji}</span>
          <div style="min-width:0">
            <div class="exp-name">${e.desc||e.merchant||cat.zh}</div>
            <div class="exp-sub2">${e.date} · ${cat.zh} · ${e.invoices||1}张</div>
          </div>
        </div>
        <div class="exp-a">${fmt(e.amount)}</div>
      </div>`;
    }).join('');
    html+=`<div class="exp-total"><span class="exp-tl">合计 🦆</span><span class="exp-ta">${fmt(total)}</span></div>`;
  }
  html+=`<div class="exp-btns">
    <button class="eb excel" onclick="exportExcel()">⬇️ 导出华商报销单 (.xlsx)</button>
    <button class="eb copy" onclick="copyText()">📄 复制文字版</button>
  </div>`;
  document.getElementById('expSheet').innerHTML=html;
  document.getElementById('expOv').classList.add('open');
}
function closeExpOv(e){if(e.target===document.getElementById('expOv'))document.getElementById('expOv').classList.remove('open');}
function exportExcel(){
  const me=getMe().sort((a,b)=>a.date.localeCompare(b.date));
  const today=new Date();
  const todayStr=`${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
  const ms=getMS(curMonth);
  const monthEn=curMonth.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
  const wb=XLSX.utils.book_new();
  const ws={};
  const range={s:{r:1,c:1},e:{r:1,c:1}};
  function sc(r,c,v,f){
    const addr=XLSX.utils.encode_cell({r,c});
    ws[addr]=f?{f,t:'n'}:{v,t:typeof v==='number'?'n':'s'};
    if(r<range.s.r)range.s.r=r;if(c<range.s.c)range.s.c=c;
    if(r>range.e.r)range.e.r=r;if(c>range.e.c)range.e.c=c;
  }
  sc(1,1,'EXPENSE CLAIM FORM');
  sc(3,1,'Company: ');sc(3,3,'Singapore Huashang Liquor Pte Ltd');
  sc(4,1,'Employee: ');sc(4,3,'GAGA');
  sc(5,1,'Date: ');sc(5,3,todayStr);
  sc(6,1,'Date');sc(6,3,'Description');sc(6,4,'Invoice');
  sc(6,5,'EXP Category');sc(6,6,'Currency');sc(6,7,'Amount');
  sc(6,8,'Allowed\n GST-Input');sc(6,9,'TOTAL');sc(6,10,'REMARK');
  const dataStart=7;
  me.forEach((e,i)=>{
    const r=dataStart+i;
    const d=new Date(e.date+'T12:00:00');
    sc(r,1,`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`);
    sc(r,3,e.desc||e.merchant||'');
    sc(r,4,e.invoices||1);
    sc(r,5,e.cat);
    sc(r,6,'SGD');
    sc(r,7,+e.amount);
    sc(r,8,0);
    const hA=XLSX.utils.encode_cell({r,c:7});
    const iA=XLSX.utils.encode_cell({r,c:8});
    sc(r,9,null,`${hA}+${iA}`);
  });
  const bufR=dataStart+me.length;
  sc(bufR,8,null,`H${bufR+1}*0.09`);
  const totR=bufR+1;
  sc(totR,7,null,`SUM(H${dataStart+1}:H${bufR+1})`);
  sc(totR,8,null,`SUM(I${dataStart+1}:I${bufR+1})`);
  sc(totR,9,null,`SUM(J${dataStart+1}:J${bufR+1})`);
  ws['!ref']=XLSX.utils.encode_range(range);
  ws['!cols']=[{wch:1},{wch:11},{wch:1},{wch:39},{wch:6},{wch:19},{wch:8},{wch:9},{wch:9},{wch:9},{wch:24}];
  ws['!rows']=[{},{hpt:17.6},{},{hpt:20},{hpt:20},{hpt:20},{hpt:25},...me.map(()=>({hpt:70})),{hpt:15},{hpt:15}];
  ws['!merges']=[{s:{r:1,c:1},e:{r:1,c:9}}];
  XLSX.utils.book_append_sheet(wb,ws,`HSL ${monthEn}`);
  const catData=[['No.','EXP Category','Description'],[1,'Advertising','Expenses incurred for advertising while trying to increase sales'],[2,'Cleaning','Expenses incurred for cleaning business property.'],[3,'Entertainment','Expenses paid by company for the business but are not deductable for income tax purposes.'],[4,'Freight & Courier','Expenses incurred on courier & freight costs'],[5,'General Expenses','General expenses related to the running of the business.'],[6,'Insurance','Expenses incurred for insuring the business assets'],[7,'Interest Expense','Any interest expenses paid to your tax authority, business bank accounts or credit card accounts.'],[8,'Legal expenses','Expenses incurred on any legal matters'],[9,'Light, Power, Heating','Expenses incurred for lighting, powering or heating the premises'],[10,'Motor Vehicle Expenses','Expenses incurred on the running of company motor vehicles'],[11,'Office Expenses','General expenses related to the running of the business office.'],[12,'Conference & Seminar Expenses','Expenses incurred on the participation in conferences and seminars'],[13,'Printing & Stationery','Expenses incurred by the entity as a result of printing and stationery'],[14,'Repairs and Maintenance','Expenses incurred on a damaged or run down asset that will bring the asset back to its original condition'],[15,'Subscriptions','E.g. Magazines, professional bodies'],[16,'Telephone & Internet','Expenditure incurred from any business-related phone calls, phone lines, or internet connections'],[17,'Travel - National','Expenses incurred from domestic travel which has a business purpose'],[18,'Travel - International','Expenses incurred from international travel which has a business purpose']];
  const wsCat=XLSX.utils.aoa_to_sheet(catData);
  wsCat['!cols']=[{wch:5},{wch:30},{wch:80}];
  XLSX.utils.book_append_sheet(wb,wsCat,'EXP Category');
  XLSX.writeFile(wb,`Huashang_Expense_Claim_of_GAGA_${ms}.xlsx`);
  toast('🦆 Excel 已下载！');
}
function copyText(){
  const me=getMe().sort((a,b)=>a.date.localeCompare(b.date));
  const label=curMonth.toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  let txt=`华商报销单 · ${label}\n员工：GAGA\n${'─'.repeat(34)}\n`;
  me.forEach(e=>{const cat=getCat(e.cat);txt+=`${e.date}  ${(e.desc||e.merchant||'').slice(0,18).padEnd(18)}  ${cat.en.slice(0,16).padEnd(16)}  S$${(+e.amount).toFixed(2)}\n`;});
  txt+=`${'─'.repeat(34)}\n合计：S$${total.toFixed(2)}`;
  navigator.clipboard.writeText(txt).then(()=>toast('📋 已复制'));
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
let pickerYear=new Date().getFullYear();
function openMonthPicker(){pickerYear=curMonth.getFullYear();renderPicker();document.getElementById('mpickerOv').classList.add('open');}
function closeMonthPicker(e){if(!e||e.target===document.getElementById('mpickerOv'))document.getElementById('mpickerOv').classList.remove('open');}
function pickerYearChange(d){pickerYear+=d;renderPicker();}
function renderPicker(){
  document.getElementById('pickerYear').textContent=pickerYear;
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const withData=new Set(entries.map(e=>e.date.slice(0,7)));
  document.getElementById('pickerGrid').innerHTML=months.map((m,i)=>{
    const ms=`${pickerYear}-${String(i+1).padStart(2,'0')}`;
    const isActive=curMonth.getFullYear()===pickerYear&&curMonth.getMonth()===i;
    const hasData=withData.has(ms);
    return `<div class="mpicker-m ${isActive?'active':''} ${hasData&&!isActive?'has-data':''}" onclick="selectMonth(${i})">${m}</div>`;
  }).join('');
}
function selectMonth(m){curMonth=new Date(pickerYear,m,1);render();document.getElementById('mpickerOv').classList.remove('open');}
render();
</script>
