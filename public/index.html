<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClaimSnap">
<meta name="theme-color" content="#0a0a0f">
<title>ClaimSnap · 华商报销</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#13131a;--s2:#1c1c26;--s3:#252532;--border:#2a2a3a;
  --text:#eeeef5;--muted:#5a5a72;--accent:#00e5a0;--accent-glow:rgba(0,229,160,0.18);
  --blue:#4f9eff;--danger:#ff5c72;
  --mono:'JetBrains Mono',monospace;--font:'Sora',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative}

.hdr{padding:calc(env(safe-area-inset-top,0px)+14px) 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:9px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.brand-text{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.brand-text span{color:var(--accent)}
.brand-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.icon-btn{background:var(--s1);border:1px solid var(--border);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
.icon-btn:active{border-color:var(--accent)}

.sum{margin:2px 16px 12px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;overflow:hidden}
.sum::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.sum-main{flex:1;min-width:0}
.sum-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.sum-amt{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--accent);margin-top:2px;letter-spacing:-1px}
.sum-n{font-size:11px;color:var(--muted);margin-top:1px}
.sum-right{text-align:right;flex-shrink:0}
.mnav{display:flex;align-items:center;gap:5px;margin-bottom:4px;justify-content:flex-end}
.mnav button{background:var(--s2);border:1px solid var(--border);color:var(--muted);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.mnav button:active{border-color:var(--accent);color:var(--accent)}
.mnav span{font-size:11px;font-weight:600;min-width:48px;text-align:center}
.exp-link{font-size:11px;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:2px}

.list{flex:1;overflow-y:auto;padding:0 16px 110px;-webkit-overflow-scrolling:touch}
.list::-webkit-scrollbar{width:2px}
.list::-webkit-scrollbar-thumb{background:var(--border)}
.day-hdr{font-size:10px;color:var(--muted);font-weight:600;padding:10px 0 5px;display:flex;justify-content:space-between}
.tx{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:7px;display:flex;gap:10px;align-items:center;cursor:pointer;transition:transform 0.12s;position:relative;overflow:hidden;animation:up 0.2s ease}
.tx:active{transform:scale(0.97)}
.tx::after{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.tx-thumb{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.tx-ph{width:42px;height:42px;border-radius:10px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:4px;margin-top:2px}
.tag{background:var(--s3);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--muted);font-weight:500}
.tx-note{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-r{text-align:right;flex-shrink:0}
.tx-amt{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent)}
.tx-time{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:12px;color:var(--muted)}
.empty-icon{font-size:50px;opacity:0.25}
.empty p{font-size:13px;text-align:center;line-height:1.8}

.fab-wrap{position:absolute;bottom:0;left:0;right:0;padding:12px 16px calc(16px + env(safe-area-inset-bottom,0px));background:linear-gradient(transparent,var(--bg) 45%)}
.fab{width:100%;background:var(--accent);color:#08080f;border:none;border-radius:16px;padding:16px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 24px rgba(0,229,160,0.28);transition:all 0.15s}
.fab:active{transform:scale(0.97)}

.ov{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.ov.open{opacity:1;pointer-events:all}
.sov{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
.sov.open{opacity:1;pointer-events:all}
.sheet{background:var(--s1);border-radius:22px 22px 0 0;padding:20px 18px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);overflow-y:auto;max-height:92dvh}
.sov.open .sheet{transform:translateY(0)}
.handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}

.scan-box{width:260px;height:320px;border:2px solid var(--accent);border-radius:16px;overflow:hidden;background:var(--s1);position:relative}
.scan-box img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1}
.scan-line{position:absolute;width:90%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanLine 2s ease-in-out infinite;left:5%;z-index:2}
@keyframes scanLine{0%,100%{top:8%}50%{top:90%}}
.scan-hint{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px}
.scan-hint b{color:var(--text);display:block;font-size:14px;margin-bottom:2px}
.row2{display:flex;gap:10px;width:260px}
.sb{flex:1;padding:13px;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.12s}
.sb.p{background:var(--accent);color:#08080f}
.sb.s{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.sb:active{transform:scale(0.95)}

.spinner{width:56px;height:56px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-msg{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;max-width:220px}
.ai-msg b{color:var(--accent);display:block;font-size:15px;margin-bottom:4px}

.r-thumb-wrap{display:flex;justify-content:center;margin-bottom:16px;position:relative}
.r-thumb{width:100px;height:66px;object-fit:cover;border-radius:10px;border:2px solid var(--border)}
.r-badge{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:var(--accent);color:#08080f;font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;white-space:nowrap}
.r-cat{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px}
.r-amount{text-align:center;font-family:var(--mono);font-size:38px;font-weight:700;color:var(--accent);letter-spacing:-2px;margin-bottom:3px}
.r-merchant{text-align:center;font-size:13px;font-weight:500;margin-bottom:2px}
.r-reason{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;padding:0 8px;line-height:1.5}
.r-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.rf{display:flex;flex-direction:column;gap:4px}
.rf label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;font-weight:600}
.rf input,.rf select,.ri{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.13s;width:100%}
.rf input:focus,.rf select:focus,.ri:focus{border-color:var(--accent)}
.rf select option{background:var(--s2)}
.ri{margin-bottom:10px}
.r-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rb{padding:14px;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.12s}
.rb.ok{background:var(--accent);color:#08080f}
.rb.no{background:var(--s2);color:var(--muted);border:1px solid var(--border)}
.rb:active{transform:scale(0.96)}

.det-img{width:100%;height:140px;border-radius:12px;overflow:hidden;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:12px}
.det-img img{width:100%;height:100%;object-fit:cover}
.det-rows{background:var(--s2);border-radius:12px;padding:2px 0;margin-bottom:12px}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 14px;border-bottom:1px solid var(--border)}
.det-row:last-child{border:none}
.det-k{font-size:11px;color:var(--muted);flex-shrink:0;padding-right:10px}
.det-v{font-size:12px;font-weight:500;text-align:right;word-break:break-word;max-width:200px}
.det-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.db{padding:13px;border-radius:12px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.12s;text-align:center}
.db.del{background:rgba(255,92,114,0.1);color:var(--danger);border:1px solid rgba(255,92,114,0.3)}
.db.cls{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.db:active{transform:scale(0.95)}

.exp-title{font-size:17px;font-weight:700;margin-bottom:2px}
.exp-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border:none}
.exp-il{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.exp-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}
.exp-sub2{font-size:10px;color:var(--muted);font-family:var(--mono)}
.exp-a{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0;padding-left:6px}
.exp-total{display:flex;justify-content:space-between;align-items:center;padding:12px 0 2px;border-top:2px solid var(--border);margin-top:3px}
.exp-tl{font-size:13px;font-weight:600}
.exp-ta{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}
.exp-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.eb{padding:14px;border-radius:12px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.12s;text-align:center}
.eb.pdf{background:var(--accent);color:#08080f}
.eb.copy{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.eb:active{transform:scale(0.96)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:12px;opacity:0;transition:all 0.24s;z-index:999;white-space:nowrap;pointer-events:none;max-width:calc(100vw - 32px);text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="brand">
      <div class="logo">📎</div>
      <div>
        <div class="brand-text">Claim<span>Snap</span></div>
        <div class="brand-sub">华商报销助手</div>
      </div>
    </div>
    <div class="icon-btn" onclick="openExport()">📋</div>
  </div>

  <div class="sum">
    <div class="sum-main">
      <div class="sum-label">本月待报销</div>
      <div class="sum-amt" id="sumAmt">S$0.00</div>
      <div class="sum-n" id="sumN">0 笔记录</div>
    </div>
    <div class="sum-right">
      <div class="mnav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="mLabel"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="exp-link" onclick="openExport()">生成报销单 →</div>
    </div>
  </div>

  <div class="list" id="list">
    <div class="empty" id="emptyEl">
      <div class="empty-icon">📸</div>
      <p>上传收据截图<br>AI 自动识别金额与类别<br>月底一键导出华商报销单 PDF</p>
    </div>
    <div id="txList"></div>
  </div>

  <div class="fab-wrap">
    <button class="fab" onclick="triggerUpload()">
      <span style="font-size:20px">📷</span> 拍照 / 上传收据
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

<!-- Scan Preview -->
<div class="ov" id="scanOv">
  <div class="scan-box">
    <div class="scan-line"></div>
    <img id="previewImg" src="" alt="" style="position:relative;z-index:1">
  </div>
  <div class="scan-hint"><b>图片已加载</b>点「AI 识别」自动提取信息</div>
  <div class="row2">
    <button class="sb s" onclick="closeScan()">取消</button>
    <button class="sb p" onclick="startRecognition()">✨ AI 识别</button>
  </div>
</div>

<!-- AI Processing -->
<div class="ov" id="aiOv">
  <div class="spinner"></div>
  <div class="ai-msg" id="aiMsg"><b>AI 分析中</b>正在识别收据内容…</div>
</div>

<!-- Result Sheet -->
<div class="sov" id="resultOv" onclick="closeResultOv(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="r-thumb-wrap">
      <img class="r-thumb" id="rThumb" src="" alt="">
      <div class="r-badge">✨ AI 识别完成</div>
    </div>
    <div class="r-cat"><span id="rIcon" style="font-size:22px"></span><span id="rCatName" style="font-size:12px;color:var(--muted)"></span></div>
    <div class="r-amount" id="rAmt">S$0.00</div>
    <div class="r-merchant" id="rMerchant"></div>
    <div class="r-reason" id="rReason"></div>
    <div class="r-grid">
      <div class="rf"><label>金额 SGD</label><input id="rAmtIn" type="number" step="0.01" min="0" inputmode="decimal"></div>
      <div class="rf"><label>发票张数</label><input id="rInvIn" type="number" min="1" value="1" inputmode="numeric"></div>
    </div>
    <div class="r-grid">
      <div class="rf"><label>费用类别</label><select id="rCatSel"></select></div>
      <div class="rf"><label>日期</label><input id="rDateIn" type="date"></div>
    </div>
    <div class="rf" style="margin-bottom:10px">
      <label>描述（填入报销单）</label>
      <input class="ri" id="rDescIn" type="text" placeholder="例：见客户打车 去程xxx" maxlength="80">
    </div>
    <div class="r-actions">
      <button class="rb no" onclick="closeResult()">重拍</button>
      <button class="rb ok" onclick="confirmEntry()">✓ 保存</button>
    </div>
  </div>
</div>

<!-- Detail Sheet -->
<div class="sov" id="detailOv" onclick="closeDetOv(event)">
  <div class="sheet" id="detailSheet"></div>
</div>

<!-- Export Sheet -->
<div class="sov" id="expOv" onclick="closeExpOv(event)">
  <div class="sheet" id="expSheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS=[
  {emoji:'🍽️',name:'Entertainment',label:'餐饮/招待'},
  {emoji:'🚕',name:'Travel - National',label:'国内交通'},
  {emoji:'✈️',name:'Travel - International',label:'国际出行'},
  {emoji:'🏨',name:'General Expenses',label:'住宿/通用'},
  {emoji:'📣',name:'Marketing',label:'市场营销'},
  {emoji:'📦',name:'Freight & Courier',label:'快递/运费'},
  {emoji:'🖨️',name:'Printing & Stationery',label:'印刷/文具'},
  {emoji:'📱',name:'Telephone & Internet',label:'电话/网络'},
  {emoji:'🔧',name:'Repairs and Maintenance',label:'维修保养'},
  {emoji:'📋',name:'Office Expenses',label:'办公费用'},
  {emoji:'🎓',name:'Conference & Seminar Expenses',label:'会议/培训'},
  {emoji:'💰',name:'Advertising',label:'广告'},
  {emoji:'🛒',name:'Subscriptions',label:'订阅'},
  {emoji:'❓',name:'General Expenses',label:'其他'},
];

document.getElementById('rCatSel').innerHTML=CATS.map(c=>`<option value="${c.name}">${c.emoji} ${c.label}</option>`).join('');

let entries=JSON.parse(localStorage.getItem('cs_v3')||'[]');
let curMonth=new Date();
let pendingB64=null,pendingResult=null;

function save(){localStorage.setItem('cs_v3',JSON.stringify(entries));}
function fmt(n){return 'S$'+Math.abs(+n).toFixed(2);}
function getMS(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function getMe(){const ms=getMS(curMonth);return entries.filter(e=>e.date.startsWith(ms));}

function render(){
  document.getElementById('mLabel').textContent=curMonth.toLocaleDateString('zh-CN',{month:'short',year:'numeric'}).replace(' ','');
  const me=getMe();
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  document.getElementById('sumAmt').textContent=fmt(total);
  document.getElementById('sumN').textContent=me.length+' 笔记录';
  const sorted=[...me].sort((a,b)=>(b.date+'T'+b.time).localeCompare(a.date+'T'+a.time));
  const byDay={};
  sorted.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);});
  const days=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  const emptyEl=document.getElementById('emptyEl');
  const listEl=document.getElementById('txList');
  if(!sorted.length){emptyEl.style.display='flex';listEl.innerHTML='';return;}
  emptyEl.style.display='none';
  listEl.innerHTML=days.map(day=>{
    const items=byDay[day];
    const dt=items.reduce((s,e)=>s+(+e.amount),0);
    const d=new Date(day+'T12:00:00');
    const isToday=day===new Date().toISOString().slice(0,10);
    const ds=isToday?'今天':d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});
    return `<div><div class="day-hdr"><span>${ds}</span><span>${fmt(dt)}</span></div>${items.map(txHTML).join('')}</div>`;
  }).join('');
}

function txHTML(e){
  const cat=CATS.find(c=>c.name===e.cat)||CATS[13];
  const th=e.thumb?`<img class="tx-thumb" src="${e.thumb}" alt="">`:`<div class="tx-ph">${cat.emoji}</div>`;
  return `<div class="tx" onclick="openDetail('${e.id}')">
    ${th}
    <div class="tx-info">
      <div class="tx-name">${e.desc||e.merchant||cat.label}</div>
      <div class="tx-meta"><span class="tag">${cat.emoji} ${cat.label}</span></div>
      ${e.merchant&&e.desc?`<div class="tx-note">${e.merchant}</div>`:''}
    </div>
    <div class="tx-r">
      <div class="tx-amt">${fmt(e.amount)}</div>
      <div class="tx-time">${e.time}</div>
    </div>
  </div>`;
}

function changeMonth(d){curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+d,1);render();}

function triggerUpload(){document.getElementById('fileInput').click();}
function handleFile(ev){
  const file=ev.target.files[0];if(!file)return;ev.target.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.85);
      pendingB64=dataUrl.split(',')[1];
      document.getElementById('previewImg').src=dataUrl;
      document.getElementById('scanOv').classList.add('open');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function closeScan(){document.getElementById('scanOv').classList.remove('open');pendingB64=null;}

async function startRecognition(){
  if(!pendingB64){toast('⚠️ 请先选择图片');return;}
  document.getElementById('scanOv').classList.remove('open');
  document.getElementById('aiOv').classList.add('open');
  const msgs=['<b>AI 分析中</b>正在识别收据内容…','<b>AI 分析中</b>提取金额与商家…','<b>AI 分析中</b>匹配华商费用类别…'];
  let si=0;
  const tick=setInterval(()=>{document.getElementById('aiMsg').innerHTML=msgs[si++%msgs.length];},1400);
  try{
    const resp=await fetch('/api/recognize',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:pendingB64})
    });
    const r=await resp.json();
    if(r.error)throw new Error(r.error);
    clearInterval(tick);
    document.getElementById('aiOv').classList.remove('open');
    showResult(r);
  }catch(err){
    clearInterval(tick);
    document.getElementById('aiOv').classList.remove('open');
    toast('❌ 识别失败，请重试');console.error(err);
  }
}

function showResult(r){
  pendingResult=r;
  const cat=CATS.find(c=>c.name===r.category)||CATS[13];
  document.getElementById('rThumb').src='data:image/jpeg;base64,'+pendingB64;
  document.getElementById('rIcon').textContent=cat.emoji;
  document.getElementById('rCatName').textContent=cat.label;
  document.getElementById('rAmt').textContent=r.amount>0?fmt(r.amount):'S$?';
  document.getElementById('rMerchant').textContent=r.merchant||'';
  document.getElementById('rReason').textContent=r.reason||'';
  document.getElementById('rAmtIn').value=r.amount||'';
  document.getElementById('rInvIn').value=r.invoices||1;
  document.getElementById('rDateIn').value=r.date||new Date().toISOString().slice(0,10);
  document.getElementById('rDescIn').value=r.desc||r.merchant||'';
  document.getElementById('rCatSel').value=r.category||'General Expenses';
  document.getElementById('resultOv').classList.add('open');
}
function closeResult(){document.getElementById('resultOv').classList.remove('open');pendingResult=null;}
function closeResultOv(e){if(e.target===document.getElementById('resultOv'))closeResult();}

function confirmEntry(){
  const amount=parseFloat(document.getElementById('rAmtIn').value);
  if(!amount||amount<=0){toast('⚠️ 请填写金额');return;}
  const now=new Date();
  const entry={
    id:Date.now().toString(),amount,
    cat:document.getElementById('rCatSel').value,
    merchant:pendingResult?.merchant||'',
    desc:document.getElementById('rDescIn').value.trim(),
    date:document.getElementById('rDateIn').value||now.toISOString().slice(0,10),
    time:now.toTimeString().slice(0,5),
    invoices:parseInt(document.getElementById('rInvIn').value)||1,
    thumb:'data:image/jpeg;base64,'+pendingB64,
  };
  entries.unshift(entry);save();closeResult();pendingB64=null;
  const ed=new Date(entry.date+'T12:00:00');
  curMonth=new Date(ed.getFullYear(),ed.getMonth(),1);
  render();
  const cat=CATS.find(c=>c.name===entry.cat)||CATS[13];
  toast(`${cat.emoji} 已保存 ${fmt(amount)}`);
}

function openDetail(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const cat=CATS.find(c=>c.name===e.cat)||CATS[13];
  const imgEl=e.thumb?`<div class="det-img"><img src="${e.thumb}" alt=""></div>`:`<div class="det-img">${cat.emoji}</div>`;
  document.getElementById('detailSheet').innerHTML=`
    <div class="handle"></div>${imgEl}
    <div class="det-rows">
      <div class="det-row"><span class="det-k">金额</span><span class="det-v" style="color:var(--accent);font-family:var(--mono)">${fmt(e.amount)}</span></div>
      <div class="det-row"><span class="det-k">类别</span><span class="det-v">${cat.emoji} ${cat.label}</span></div>
      <div class="det-row"><span class="det-k">描述</span><span class="det-v" style="font-size:11px">${e.desc||'—'}</span></div>
      <div class="det-row"><span class="det-k">商家</span><span class="det-v">${e.merchant||'—'}</span></div>
      <div class="det-row"><span class="det-k">发票数</span><span class="det-v">${e.invoices||1} 张</span></div>
      <div class="det-row"><span class="det-k">日期</span><span class="det-v" style="font-family:var(--mono)">${e.date}</span></div>
    </div>
    <div class="det-acts">
      <button class="db del" onclick="delEntry('${e.id}')">🗑️ 删除</button>
      <button class="db cls" onclick="closeDet()">关闭</button>
    </div>`;
  document.getElementById('detailOv').classList.add('open');
}
function closeDet(){document.getElementById('detailOv').classList.remove('open');}
function closeDetOv(e){if(e.target===document.getElementById('detailOv'))closeDet();}
function delEntry(id){entries=entries.filter(x=>x.id!==id);save();render();closeDet();toast('🗑️ 已删除');}

function openExport(){
  const me=getMe().sort((a,b)=>a.date.localeCompare(b.date));
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  const monthName=curMonth.toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
  let html=`<div class="handle"></div>
    <div class="exp-title">📋 ${monthName}报销单</div>
    <div class="exp-sub">${me.length} 笔 · 合计 ${fmt(total)}</div>`;
  if(!me.length){html+='<div style="color:var(--muted);font-size:13px;text-align:center;padding:28px 0">本月暂无报销记录</div>';}
  else{
    html+=me.map(e=>{
      const cat=CATS.find(c=>c.name===e.cat)||CATS[13];
      return `<div class="exp-item">
        <div class="exp-il"><span style="font-size:15px;flex-shrink:0">${cat.emoji}</span>
          <div style="min-width:0"><div class="exp-name">${e.desc||e.merchant||cat.label}</div>
          <div class="exp-sub2">${e.date} · ${cat.label} · ${e.invoices||1}张</div></div></div>
        <div class="exp-a">${fmt(e.amount)}</div></div>`;
    }).join('');
    html+=`<div class="exp-total"><span class="exp-tl">合计</span><span class="exp-ta">${fmt(total)}</span></div>`;
  }
  html+=`<div class="exp-btns">
    <button class="eb pdf" onclick="exportPDF()">⬇️ 导出华商报销单 PDF</button>
    <button class="eb copy" onclick="copyText()">📄 复制文字版</button>
  </div>`;
  document.getElementById('expSheet').innerHTML=html;
  document.getElementById('expOv').classList.add('open');
}
function closeExpOv(e){if(e.target===document.getElementById('expOv'))document.getElementById('expOv').classList.remove('open');}

function exportPDF(){
  const me=getMe().sort((a,b)=>a.date.localeCompare(b.date));
  const today=new Date();
  const todayStr=`${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
  const ms=getMS(curMonth);
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const PW=297,PH=210;
  let y=14;
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(0,0,0);
  doc.text('EXPENSE CLAIM FORM',PW/2,y,{align:'center'});y+=8;
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');
  doc.setTextColor(120,120,120);doc.text('Company:',14,y);doc.setTextColor(0,0,0);doc.text('Singapore Huashang Liquor Pte Ltd',35,y);y+=5;
  doc.setTextColor(120,120,120);doc.text('Employee:',14,y);doc.setTextColor(0,0,0);doc.text('GAGA',35,y);y+=5;
  doc.setTextColor(120,120,120);doc.text('Date:',14,y);doc.setTextColor(0,0,0);doc.text(todayStr,35,y);y+=6;
  doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);doc.line(14,y,PW-14,y);y+=4;
  const rows=me.map(e=>{
    const d=new Date(e.date+'T12:00:00');
    return[`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`,e.desc||(e.merchant||e.cat),String(e.invoices||1),e.cat,'SGD',(+e.amount).toFixed(2),'-',(+e.amount).toFixed(2)];
  });
  rows.push(['','','','','',`$${total.toFixed(2)}`,'$ -',`$${total.toFixed(2)}`]);
  doc.autoTable({
    startY:y,
    head:[['Date','Description','Invoice','EXP Category','Currency','Amount','Allowed GST-Input','TOTAL']],
    body:rows,
    margin:{left:14,right:14},
    styles:{fontSize:8,cellPadding:2.5,textColor:[0,0,0],lineColor:[220,220,220],lineWidth:0.2},
    headStyles:{fillColor:[41,98,170],textColor:[255,255,255],fontStyle:'bold',fontSize:8,halign:'center'},
    columnStyles:{
      0:{cellWidth:22,halign:'center'},1:{cellWidth:74},2:{cellWidth:14,halign:'center'},
      3:{cellWidth:36,textColor:[41,98,170]},4:{cellWidth:18,halign:'center'},
      5:{cellWidth:20,halign:'right'},6:{cellWidth:24,halign:'center',textColor:[140,140,140]},
      7:{cellWidth:22,halign:'right',fontStyle:'bold'},
    },
    alternateRowStyles:{fillColor:[247,247,247]},
    didParseCell:(d)=>{if(d.row.index===rows.length-1){d.cell.styles.fontStyle='bold';d.cell.styles.fillColor=[235,245,255];}},
    didDrawPage:()=>{doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text(`Singapore Huashang Liquor Pte Ltd · ${ms} Expense Claim`,PW/2,PH-6,{align:'center'});}
  });
  doc.save(`Huashang_Expense_Claim_of_GAGA_${ms}.pdf`);
  toast('✅ PDF 已下载');
}

function copyText(){
  const me=getMe().sort((a,b)=>a.date.localeCompare(b.date));
  const label=curMonth.toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
  const total=me.reduce((s,e)=>s+(+e.amount),0);
  let txt=`华商报销单 · ${label}\n员工：GAGA\n${'─'.repeat(34)}\n`;
  me.forEach(e=>{txt+=`${e.date}  ${(e.desc||e.merchant||'').slice(0,18).padEnd(18)}  ${e.cat.slice(0,16).padEnd(16)}  S$${(+e.amount).toFixed(2)}\n`;});
  txt+=`${'─'.repeat(34)}\n合计：S$${total.toFixed(2)}`;
  navigator.clipboard.writeText(txt).then(()=>toast('📋 已复制'));
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
render();
</script>
